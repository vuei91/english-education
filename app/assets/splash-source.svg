<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Fluen splash icon — no text, just the F lettermark for Expo splash -->
  
  <!-- F vertical stroke — near-black -->
  <path d="M 150 80 L 150 432" 
        stroke="#171717" stroke-width="50" stroke-linecap="round" fill="none"/>
  
  <!-- F top horizontal — emerald wave -->
  <path d="M 150 80 Q 230 48, 310 80 Q 370 105, 410 80" 
        stroke="#3ecf8e" stroke-width="50" stroke-linecap="round" fill="none"/>
  
  <!-- F middle horizontal — emerald wave (lighter) -->
  <path d="M 150 230 Q 220 200, 290 230 Q 345 255, 380 230" 
        stroke="#3ecf8e" stroke-width="44" stroke-linecap="round" fill="none" opacity="0.7"/>
  
  <!-- Flow lines — subtle grey -->
  <path d="M 245 340 Q 295 322, 345 340 Q 395 358, 425 340" 
        stroke="#dfdfdf" stroke-width="16" stroke-linecap="round" fill="none"/>
  <path d="M 265 388 Q 310 372, 355 388 Q 400 404, 425 388" 
        stroke="#ededed" stroke-width="13" stroke-linecap="round" fill="none"/>
</svg>
